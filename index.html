<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Especial</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Importar fuente Pacifico de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <!-- Iconos para el botón de música -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* Mejoras para móvil */
        html, body {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            touch-action: manipulation;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        /* FONDO DEL CIELO (implementación del sol y la luna) */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #1a2980, #26d0ce); /* Gradiente azul más neutro */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Contenedor del cielo */
        #cieloContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Aumentado para que los meteoritos estén por encima */
            pointer-events: none;
        }

        /* Sol y luna - versión simplificada para fondo */
        #sol {
            position: absolute;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #ffeb3b 0%, #ff9800 70%, #ff5722 100%);
            border-radius: 50%;
            box-shadow: 0 0 55px rgba(255, 235, 59, 0.7), 0 0 140px rgba(255, 152, 0, 0.4);
            z-index: 2;
            opacity: 0.9;
            transition: left 2s ease, top 2s ease, opacity 2s ease;
        }

        #luna {
            position: absolute;
            width: 100px;
            height: 100px;
            z-index: 2;
            opacity: 0;
            transition: left 2s ease, top 2s ease, opacity 2s ease;
            filter: drop-shadow(0 0 18px rgba(200, 230, 255, 0.7)) drop-shadow(0 0 40px rgba(150, 200, 255, 0.35));
        }

        #estrellasContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .estrella {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* ============ METEORITOS (SOLO DE NOCHE) ============ */
        .meteorito {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ffffff 0%, #4fc3f7 70%, #0288d1 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 15px 3px rgba(255, 255, 255, 0.9),
                0 0 30px 6px rgba(79, 195, 247, 0.7),
                inset 0 0 10px rgba(255, 255, 255, 0.8);
            z-index: 20;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .meteorito:hover {
            transform: scale(1.5);
            box-shadow: 
                0 0 20px 5px rgba(255, 255, 255, 1),
                0 0 40px 10px rgba(79, 195, 247, 0.9),
                inset 0 0 15px rgba(255, 255, 255, 1);
        }

        .meteorito.estrella-fugaz {
            width: 6px;
            height: 40px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: linear-gradient(to bottom, #ffffff 0%, #4fc3f7 40%, #0288d1 100%);
            box-shadow: 
                0 0 20px 5px rgba(255, 255, 255, 0.9),
                0 0 40px 8px rgba(79, 195, 247, 0.8);
            animation: caerEstrella linear forwards;
        }

        @keyframes caerEstrella {
            0% {
                transform: translateY(-100px) translateX(0) rotate(45deg);
                opacity: 1;
            }
            70% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) translateX(100px) rotate(45deg);
                opacity: 0;
            }
        }

        /* ============ FLORES (SOLO DE DÍA) ============ */
        .flor {
            position: absolute;
            bottom: 10px;
            z-index: 15;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.2));
            animation: flotar 6s ease-in-out infinite;
        }

        .flor:hover {
            transform: scale(1.2) translateY(-5px);
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* SVG para las flores - Todas las partes internas con pointer-events: none */
        .flor svg {
            width: 100%;
            height: 100%;
            pointer-events: none; /* IMPORTANTE: hace que el SVG no capture eventos */
        }

        .flor svg * {
            pointer-events: none; /* IMPORTANTE: todas las partes internas no capturan eventos */
        }

        /* Contenedor para asegurar que todo el SVG sea clickeable */
        .flor .flor-contenedor {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Flor rosa - Ajustada como elemento único */
        .flor-rosa {
            width: 45px;
            height: 65px;
        }

        /* Tulipán - Ajustado como elemento único */
        .flor-tulipan {
            width: 40px;
            height: 60px;
        }

        /* ============ CORAZÓN DE PULSACIÓN LARGA (NUEVO) ============ */
        .corazon-pulsacion {
            position: fixed;
            font-size: 150px; /* Tamaño grande */
            color: #ff5252;
            z-index: 1000; /* Muy por encima de todo */
            pointer-events: none;
            animation: acercarseCorazon 3s ease-out forwards;
            text-shadow: 
                0 0 50px rgba(255, 82, 82, 0.9),
                0 0 100px rgba(255, 82, 82, 0.7),
                0 0 150px rgba(255, 82, 82, 0.5);
            filter: drop-shadow(0 0 30px rgba(255, 82, 82, 0.8));
            transform-origin: center;
        }

        @keyframes acercarseCorazon {
            0% {
                transform: scale(0.1) translateY(0) translateZ(0);
                opacity: 0.8;
            }
            30% {
                transform: scale(1) translateY(-50px) translateZ(100px);
                opacity: 1;
            }
            70% {
                transform: scale(1.5) translateY(-100px) translateZ(200px);
                opacity: 1;
            }
            100% {
                transform: scale(2.5) translateY(-150px) translateZ(300px);
                opacity: 0;
            }
        }

        /* Indicador de carga durante la pulsación */
        .pulsacion-cargando {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 82, 82, 0.3);
            border-top-color: #ff5252;
            animation: girarCarga 1s linear infinite;
            z-index: 999;
            pointer-events: none;
            display: none;
        }

        @keyframes girarCarga {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ============ EXPLOSIÓN DE CORAZONES ============ */
        .corazon-explosion {
            position: absolute;
            font-size: 36px;
            color: #ff5252;
            z-index: 100;
            pointer-events: none;
            animation: explotarCorazon 1s ease-out forwards;
            text-shadow: 
                0 0 15px rgba(255, 82, 82, 0.9),
                0 0 30px rgba(255, 82, 82, 0.7);
            filter: drop-shadow(0 0 10px rgba(255, 82, 82, 0.8));
        }

        @keyframes explotarCorazon {
            0% {
                transform: scale(0.1) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: scale(1.8) rotate(180deg);
                opacity: 1;
            }
            100% {
                transform: scale(2.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Partículas de corazón */
        .particula-corazon {
            position: absolute;
            font-size: 24px;
            color: #ff5252;
            z-index: 90;
            pointer-events: none;
            animation: volarParticula 1.5s ease-out forwards;
            text-shadow: 0 0 8px rgba(255, 82, 82, 0.8);
            filter: drop-shadow(0 0 5px rgba(255, 82, 82, 0.6));
        }

        @keyframes volarParticula {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Capa de transparencia para el contenido */
        #contenidoWrapper {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #wrapper {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
            text-align: center;
        }
        
        /* Botón de música flotante */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 82, 82, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: 2px solid white;
        }
        
        .music-control:hover {
            background: rgba(255, 82, 82, 1);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .music-control i {
            font-size: 24px;
            color: white;
        }
        
        .music-control.playing i {
            color: #ffeb3b;
        }
        
        .music-control.pulsing {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }
        
        /* Reproductor de música - AJUSTADO PARA PC */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px;
            width: 90%;
            max-width: 300px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            z-index: 100;
        }
        
        .song-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 6px;
        }
        
        .song-btn {
            flex: 1;
            padding: 6px 8px;
            background: rgba(255, 82, 82, 0.8);
            border: none;
            border-radius: 20px;
            color: white;
            font-family: 'Pacifico', cursive;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .song-btn:hover {
            background: rgba(255, 82, 82, 1);
            transform: translateY(-2px);
        }
        
        .song-btn.active {
            background: #ffeb3b;
            color: #1c258b;
            box-shadow: 0 2px 10px rgba(255, 235, 59, 0.4);
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .play-pause-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 82, 82, 0.9);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .play-pause-btn:hover {
            background: rgba(255, 82, 82, 1);
            transform: scale(1.1);
        }
        
        .song-info {
            flex: 1;
            text-align: left;
        }
        
        .song-title {
            color: white;
            font-size: 12px;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .song-artist {
            color: rgba(255, 255, 255, 0.7);
            font-size: 10px;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
        }
        
        .volume-control i {
            color: white;
            font-size: 14px;
        }
        
        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff5252;
            cursor: pointer;
        }
        
        /* Notificación de música */
        .music-notification {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            max-width: 200px;
            z-index: 999;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            text-align: center;
        }
        
        .music-notification.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* EL SOBRE (CONTENEDOR) - Color rojo elegante CON EFECTOS MEJORADOS */
        .envelope {
            width: 200px;
            height: 100px;
            margin: 0 auto;
            background: linear-gradient(145deg, #b92424, #ff5252);
            box-shadow: 
                0 0 1px rgba(0,0,0,0.3),
                0 4px 20px rgba(0,0,0,0.25),
                0 15px 40px rgba(255, 82, 82, 0.3),
                0 0 80px rgba(255, 82, 82, 0.15);
            position: relative;
            perspective: 800px;
            cursor: pointer;
            border-radius: 2px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* Efecto de pulso (punto 1b) */
            animation: sobrePulse 4s infinite;
        }
        
        /* Punto 1a: Efecto glow intensificado al pasar el cursor */
        .envelope:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 0 5px rgba(255, 82, 82, 0.8),
                0 10px 40px rgba(0,0,0,0.4),
                0 25px 70px rgba(255, 82, 82, 0.5),
                0 0 150px rgba(255, 82, 82, 0.4);
            animation: sobreGlow 0.8s infinite alternate;
        }
        
        .envelope:active {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 
                0 0 10px rgba(255, 82, 82, 1),
                0 8px 30px rgba(0,0,0,0.5),
                0 20px 60px rgba(255, 82, 82, 0.6),
                0 0 120px rgba(255, 82, 82, 0.5);
        }
        
        /* Animación de pulso (punto 1b) */
        @keyframes sobrePulse {
            0%, 100% {
                box-shadow: 
                    0 0 1px rgba(0,0,0,0.3),
                    0 4px 20px rgba(0,0,0,0.25),
                    0 15px 40px rgba(255, 82, 82, 0.3),
                    0 0 80px rgba(255, 82, 82, 0.15);
            }
            50% {
                box-shadow: 
                    0 0 2px rgba(255, 82, 82, 0.4),
                    0 4px 25px rgba(0,0,0,0.3),
                    0 15px 45px rgba(255, 82, 82, 0.4),
                    0 0 90px rgba(255, 82, 82, 0.2);
            }
        }
        
        /* Efecto glow al hover (punto 1a intensificado) */
        @keyframes sobreGlow {
            0% {
                box-shadow: 
                    0 0 5px rgba(255, 82, 82, 0.8),
                    0 10px 40px rgba(0,0,0,0.4),
                    0 25px 70px rgba(255, 82, 82, 0.5),
                    0 0 150px rgba(255, 82, 82, 0.4);
            }
            100% {
                box-shadow: 
                    0 0 8px rgba(255, 82, 82, 1),
                    0 10px 45px rgba(0,0,0,0.5),
                    0 25px 80px rgba(255, 82, 82, 0.7),
                    0 0 180px rgba(255, 82, 82, 0.6);
            }
        }
        
        .envelope:after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border: 0 solid rgba(0,0,0,0.15);
            border-width: 45px 100px;
            border-top-color: transparent;
            z-index: 2;
        }
        
        .envelope .flap {
            position: absolute;
            width: 100%;
            height: 0;
            border: 0 solid transparent;
            border-width: 50px 100px;
        }
        
        .envelope .flap.front {
            border-left-color: #e26060;
            border-right-color: #e26060;
            border-bottom-color: #e74c3c;
            z-index: 3;
        }
        
        .envelope .flap.front:after {
            content: '';
            width: 100%;
            height: 0;
            position: absolute;
            left: -100px;
            bottom: -50px;
            border: 0 solid transparent;
            border-width: 49px 100px;
            border-bottom-color: #e26060;
        }
        
        .envelope .flap.top {
            border-top-width: 55px;
            border-top-color: #e74c3c;
            z-index: 3;
            animation-duration: 1s;
            animation-fill-mode: forwards;
            transform-origin: top;
            transform-style: preserve-3d;
        }
        
        .envelope.open .flap.top {
            animation-name: flip;
        }
        
        .envelope.closing-step4 .flap.top {
            animation-name: flip-reverse;
            animation-delay: 0s;
        }
        
        .envelope.letter-open .flap.top {
            transform: rotateX(180deg);
            z-index: 1 !important; 
        }
        
        .envelope.closing-step1 .flap.top,
        .envelope.closing-step2 .flap.top,
        .envelope.closing-step3 .flap.top {
            transform: rotateX(180deg);
            z-index: 1 !important;
        }
        
        /* LA CARTA */
        .envelope .letter {
            position: absolute;
            width: 194px;
            height: 84px;
            background: linear-gradient(to bottom, #fff9f9, #fff);
            top: 8px;
            left: 3px;
            border: 1px solid rgba(255, 107, 107, 0.3);
            z-index: 1;
            animation-duration: 2s;
            animation-delay: 1.5s;
            animation-fill-mode: forwards;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(255, 107, 107, 0.1);
            border-radius: 1px;
        }

        /* --- ESTILOS DEL TEXTO CON FUENTE PACIFICO --- */
        .letter-content {
            font-family: 'Pacifico', cursive;
            font-size: 15px;
            color: #5d4037;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: center;
            pointer-events: none;
            padding: 8px 10px;
            z-index: 10;
            position: relative;
            line-height: 1.4;
            text-shadow: 0.5px 0.5px 1px rgba(0,0,0,0.1);
            letter-spacing: 0.2px;
            font-weight: normal;
        }

        /* --- EMOJIS POSICIONADOS EN EL SOBRE (NO EN LA CARTA) --- */
        .emoji-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .emoji-top, .emoji-bottom {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.3s ease;
            z-index: 15;
            pointer-events: none;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
        }

        .emoji-top {
            top: -35px;
        }

        .emoji-bottom {
            bottom: -35px;
        }

        /* Mostrar texto y emojis simultáneamente */
        .envelope.show-text .letter-content,
        .envelope.show-text .emoji-top,
        .envelope.show-text .emoji-bottom {
            opacity: 1;
        }
        
        .envelope.show-text .emoji-top {
            animation: floatUp 2s ease-in-out infinite;
        }
        
        .envelope.show-text .emoji-bottom {
            animation: floatDown 2s ease-in-out infinite;
        }
        
        /* ANIMACIONES DE LA CARTA */
        .envelope.open .letter {
            animation-name: remove;
        }
        
        .envelope.closing-step3 .letter {
            animation-name: return;
            animation-delay: 0s;
            animation-duration: 1.5s;
            z-index: 1;
        }
        
        .envelope.letter-open .letter {
            top: 8px;
            z-index: 4 !important;
            animation: none !important;
        }
        
        .envelope.closing-step1 .letter,
        .envelope.closing-step2 .letter {
            z-index: 4 !important;
        }
        
        /* PLIEGUES DE LA CARTA */
        .envelope .letter:before,
        .envelope .letter:after {
            content: '';
            position: absolute;
            width: 192px;
            height: 75%;
            left: -1px;
            background: linear-gradient(to bottom, #fff9f9, #fff);
            border: 1px solid rgba(255, 107, 107, 0.3);
            animation-duration: 1s;
            animation-fill-mode: forwards;
            transform-origin: top;
            transform-style: preserve-3d;
        }
        
        .envelope .letter:before {
            z-index: 2;
            transform: rotateX(10deg);
        }
        
        .envelope.open .letter:before {
            animation-name: fold-up;
            animation-delay: 3.5s;
        }
        
        .envelope.closing-step2 .letter:before {
            animation-name: fold-up-reverse;
            animation-delay: 0s;
        }
        
        .envelope.letter-open .letter:before {
            transform: rotateX(140deg);
            animation: none !important;
        }
        
        .envelope.closing-step1 .letter:before {
            transform: rotateX(140deg) !important;
            animation: none !important;
        }
        
        .envelope .letter:after {
            z-index: 2;
            transform-origin: bottom;
            transform: rotateX(-5deg);
            bottom: 0;
        }
        
        .envelope.open .letter:after {
            animation-name: fold-down;
            animation-delay: 4.5s;
        }
        
        .envelope.closing-step1 .letter:after {
            animation-name: fold-down-reverse;
            animation-delay: 0s;
        }
        
        .envelope.letter-open .letter:after {
            transform: rotateX(-140deg);
            animation: none !important;
        }
        
        /* --- KEYFRAMES --- */
        @keyframes flip { 
            100% { transform: rotateX(180deg); z-index: 1; } 
        }
        
        @keyframes flip-reverse { 
            0% { transform: rotateX(180deg); z-index: 1; } 
            100% { transform: rotateX(0deg); z-index: 3; } 
        }
        
        @keyframes remove { 
            0% { top: 8px; z-index: 1; } 
            50% { top: -120px; z-index: 4; } 
            100% { top: 8px; z-index: 4; } 
        }
        
        @keyframes return { 
            0% { top: 8px; z-index: 4; } 
            40% { top: -120px; z-index: 4; } 
            41% { top: -120px; z-index: 1; } 
            100% { top: 8px; z-index: 1; } 
        }
        
        @keyframes fold-up { 
            0% { transform: rotateX(10deg); } 
            100% { transform: rotateX(140deg); } 
        }
        
        @keyframes fold-up-reverse { 
            0% { transform: rotateX(140deg); } 
            100% { transform: rotateX(10deg); } 
        }
        
        @keyframes fold-down { 
            0% { transform: rotateX(-5deg); } 
            100% { transform: rotateX(-140deg); } 
        }
        
        @keyframes fold-down-reverse { 
            0% { transform: rotateX(-140deg); } 
            100% { transform: rotateX(-5deg); } 
        }
        
        @keyframes floatUp {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        
        @keyframes floatDown {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(5px); }
        }

        /* Animaciones específicas para móvil */
        @keyframes floatUpMobile {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-3px); }
        }

        @keyframes floatDownMobile {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(3px); }
        }
        
        /* Media queries para móvil - CONFIGURACIÓN SEPARADA */
        @media (max-width: 768px) {
            body {
                padding: 15px;
                background: linear-gradient(to bottom, #1a237e, #2196F3);

            #contenidoWrapper {

            .envelope {

            .envelope:active {
                transform: scale(1.3) translateY(-2px) scale(1.01);
            }
            
            .letter-content {
                font-size: 16px;
                padding: 6px 8px;
            }
            
            /* CORRECCIÓN PARA LOS EMOJIS EN MÓVIL */
            .emoji-top, .emoji-bottom {
                font-size: 18px;
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
            }
            
            /* Ajustar posición del emoji superior para que no se salga */
            .emoji-top {
                top: -28px;
            }
            
            .emoji-bottom {
                bottom: -28px;
            }
            
            /* Ajustar las animaciones para la nueva posición */
            .envelope.show-text .emoji-top {
                animation: floatUpMobile 2s ease-in-out infinite;
            }
            
            .envelope.show-text .emoji-bottom {
                animation: floatDownMobile 2s ease-in-out infinite;
            }
            
            /* Ajustes para el corazón de pulsación en móvil */
            .corazon-pulsacion {

            }
            
            .pulsacion-cargando {

            /* Ajustes para el botón de música en móvil */

                bottom: 15px;

                height: 45px;
            }
            
            .music-control i {

            }
            
            /* REPRODUCTOR DE MÚSICA - POSICIÓN DIFERENTE EN MÓVIL */
            .music-player {
                bottom: 70px !important;
                max-width: 280px;
                padding: 8px;

            .song-selector {

            .volume-slider {
                height: 2px;
            }
            
            .volume-slider::-webkit-slider-thumb {

                height: 12px;
            }
            
            /* Notificación de música en móvil */
            .music-notification {
                bottom: 120px;
                right: 15px;
                font-size: 12px;
                max-width: 180px;

            /* Ajustes flores y meteoritos en móvil */

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            }

                transform: scale(1.2);

            }

            /* Ajustar aún más para pantallas muy pequeñas */

                top: -25px;

            /* Ajustes para el corazón de pulsación en móvil pequeño */

            /* Ajustes para pantallas muy pequeñas */

            /* REPRODUCTOR AÚN MÁS COMPACTO para pantallas muy pequeñas */

            .music-notification {

            /* Ajustes flores y meteoritos en móvil muy pequeño */

            .meteorito.estrella-fugaz {

        /* Media query solo para escritorio (más de 768px) */

            }
            
            .music-notification {

    </style>
</head>

    <!-- Audio para efecto de explosión (oculto) -->
    <audio id="explosionSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-explosion-2759.mp3" type="audio/mpeg">

    <script>
        $(document).ready(function() {
            // ==============================================
            // NUEVO: SISTEMA DE PULSACIÓN LARGA EN EL SOBRE
            // ==============================================
            
            let pulsacionTimer = null;
            let pulsacionActiva = false;
            let touchStartTime = 0;
            const tiempoPulsacion = 3000; // 3 segundos
            
            function iniciarPulsacion(event) {
                if (pulsacionActiva || sobreAbierto || animando) return;
                
                event.preventDefault();
                event.stopPropagation();
                
                // Guardar tiempo de inicio
                touchStartTime = Date.now();
                pulsacionActiva = true;
                
                // Mostrar indicador de carga EN EL CENTRO DE LA PANTALLA
                const cargando = document.getElementById('pulsacionCargando');
                cargando.style.display = 'block';
                
                // Iniciar temporizador
                pulsacionTimer = setTimeout(() => {
                    crearCorazonPulsacion(event);
                    detenerPulsacion();
                }, tiempoPulsacion);
                
                console.log('⏱️ Pulsación larga iniciada...');
            }
            
            function detenerPulsacion(event) {
                if (event) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                
                if (pulsacionTimer) {
                    clearTimeout(pulsacionTimer);
                    pulsacionTimer = null;
                }
                
                if (pulsacionActiva) {
                    const touchDuration = Date.now() - touchStartTime;
                    
                    // Si fue un touch corto (menos de 300ms), NO hacer nada especial
                    // Solo ocultar el loader y resetear
                    if (touchDuration < 300) {
                        console.log('⏱️ Touch corto - ignorando pulsación');
                    } else if (touchDuration < tiempoPulsacion) {
                        console.log('⏱️ Pulsación cancelada después de', touchDuration + 'ms');
                    }
                    
                    pulsacionActiva = false;
                    
                    // Ocultar indicador de carga
                    const cargando = document.getElementById('pulsacionCargando');
                    cargando.style.display = 'none';
                }
            }
            
            function crearCorazonPulsacion(event) {
                const envelope = document.querySelector('.envelope');
                const rect = envelope.getBoundingClientRect();
                
                // Calcular posición central del sobre
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;
                
                console.log('💖 Creando corazón de pulsación en:', x, y);
                
                // Reproducir sonido de explosión (más suave)
                const explosionSound = document.getElementById('explosionSound');
                explosionSound.currentTime = 0;
                explosionSound.volume = 0.2;
                explosionSound.play().catch(e => console.log("Error al reproducir sonido:", e));
                
                // Crear corazón grande
                const corazon = document.createElement('div');
                corazon.className = 'corazon-pulsacion';
                corazon.innerHTML = '❤️';
                corazon.style.left = x + 'px';
                corazon.style.top = y + 'px';
                
                // Añadir al body
                document.body.appendChild(corazon);
                
                // Mostrar notificación
                showNotification("¡Corazón especial enviado! ❤️");
                
                // Registrar en estadísticas
                registrarVisitaLocal('Corazón especial (pulsación larga)', '💖');
                
                // Eliminar después de la animación
                setTimeout(() => {
                    if (corazon.parentNode) {
                        corazon.parentNode.removeChild(corazon);
                    }
                }, 3000);
            }
            
            // ==============================================
            // SISTEMA DE SOL Y LUNA SEGÚN LA HORA
            // ==============================================
            
            function actualizarCielo() {
                const ahora = new Date();
                const hora = ahora.getHours();
                const minuto = ahora.getMinutes();
                const segundo = ahora.getSeconds();
                
                const totalSegundos = hora * 3600 + minuto * 60 + segundo;
                const porcentajeDia = totalSegundos / 86400;
                
                const amanecer = 8;
                const atardecer = 18;
                
                const sol = document.getElementById('sol');
                const luna = document.getElementById('luna');
                const estrellas = document.getElementById('estrellasContainer');
                
                const esDia = hora >= amanecer && hora < atardecer;
                
                // Tamaño fijo para sol y luna, sin margin negativo
                const tamanoSol = 110;
                const tamanoLuna = 100;
                
                if (esDia) {
                    // --- SOL ---
                    const duracionDia = atardecer - amanecer;
                    const horaActualDia = hora + minuto / 60 - amanecer;
                    const progresoDia = horaActualDia / duracionDia; // 0 (amanecer) → 1 (atardecer)
                    
                    // Arco del sol: de izquierda (5%) → centro (50%) → derecha (95%)
                    // Altura: sube desde 25% en los extremos hasta 5% en el centro (mediodía)
                    const angulo = progresoDia * Math.PI; // 0 → π
                    const xSol = 5 + progresoDia * 90; // 5% → 95% del ancho
                    const ySol = 25 - Math.sin(angulo) * 20; // 25% en extremos, ~5% al mediodía
                    
                    sol.style.left = xSol + '%';
                    sol.style.top = ySol + '%';
                    sol.style.width = tamanoSol + 'px';
                    sol.style.height = tamanoSol + 'px';
                    sol.style.margin = '0';
                    sol.style.transform = 'translate(-50%, -50%)';
                    
                    // Color según la hora
                    if (hora < amanecer + 1 || hora >= atardecer - 1) {
                        sol.style.background = 'radial-gradient(circle, #ff9800 0%, #ff5722 70%, #d84315 100%)';
                        sol.style.opacity = '0.75';
                    } else if (hora >= 11 && hora <= 13) {
                        sol.style.background = 'radial-gradient(circle, #ffeb3b 0%, #ffc107 70%, #ff9800 100%)';
                        sol.style.opacity = '1';
                    } else {
                        sol.style.background = 'radial-gradient(circle, #ffeb3b 0%, #ff9800 70%, #ff5722 100%)';
                        sol.style.opacity = '0.9';
                    }
                    sol.style.boxShadow = '0 0 55px rgba(255,235,59,0.7), 0 0 140px rgba(255,152,0,0.4)';
                    
                    sol.style.display = 'block';
                    luna.style.display = 'none';
                    estrellas.style.opacity = 0;
                    
                } else {
                    // --- LUNA ---
                    let duracionNoche, horaActualNoche;
                    if (hora < amanecer) {
                        duracionNoche = amanecer + (24 - atardecer);
                        horaActualNoche = hora + 24 - atardecer;
                    } else {
                        duracionNoche = amanecer + (24 - atardecer);
                        horaActualNoche = hora - atardecer;
                    }
                    
                    const progresoNoche = horaActualNoche / duracionNoche; // 0 → 1
                    
                    // Arco de la luna: de izquierda → centro → derecha, igual que el sol pero de noche
                    const angulo = progresoNoche * Math.PI;
                    const xLuna = 5 + progresoNoche * 90; // 5% → 95%
                    const yLuna = 25 - Math.sin(angulo) * 18; // 25% en extremos, ~7% en el centro
                    
                    luna.style.left = xLuna + '%';
                    luna.style.top = yLuna + '%';
                    luna.style.width = tamanoLuna + 'px';
                    luna.style.height = tamanoLuna + 'px';
                    luna.style.margin = '0';
                    luna.style.transform = 'translate(-50%, -50%)';
                    luna.style.opacity = Math.max(0.5, 0.85 - Math.abs(12 - hora) * 0.03);
                    luna.style.boxShadow = '';  // el drop-shadow lo da el CSS con filter
                    
                    sol.style.display = 'none';
                    luna.style.display = 'block';
                    
                    const opacidadEstrellas = 0.1 + Math.abs(0 - hora) * 0.03;
                    estrellas.style.opacity = Math.min(0.8, opacidadEstrellas);
                }
                
                // Fondo del cielo según la hora
                let colorInicio, colorFin;
                if (hora >= amanecer - 1 && hora < amanecer + 1) {
                    colorInicio = '#1a2980'; colorFin = '#26d0ce';
                } else if (hora >= amanecer && hora < atardecer - 2) {
                    colorInicio = '#87CEEB'; colorFin = '#E0F7FA';
                } else if (hora >= atardecer - 2 && hora < atardecer + 1) {
                    colorInicio = '#FF9800'; colorFin = '#1a2980';
                } else {
                    colorInicio = '#0A192F'; colorFin = '#1a2980';
                }
                document.body.style.background = `linear-gradient(to bottom, ${colorInicio}, ${colorFin})`;
                
                if (esDia) {
                    controlarFlores(true);
                    controlarMeteoritos(false);
                } else {
                    controlarFlores(false);
                    controlarMeteoritos(true);
                }
            }
            
            // Crear estrellas aleatorias
            function crearEstrellas() {
                const container = document.getElementById('estrellasContainer');
                container.innerHTML = '';
                
                for (let i = 0; i < 100; i++) {
                    const estrella = document.createElement('div');
                    estrella.className = 'estrella';
                    
                    // Tamaño aleatorio entre 1 y 3px
                    const tamaño = Math.random() * 2 + 1;
                    estrella.style.width = tamaño + 'px';
                    estrella.style.height = tamaño + 'px';
                    
                    // Posición aleatoria
                    estrella.style.left = Math.random() * 100 + '%';
                    estrella.style.top = Math.random() * 100 + '%';
                    
                    // Opacidad aleatoria
                    estrella.style.opacity = Math.random() * 0.7 + 0.3;
                    
                    // Retraso de animación aleatorio
                    estrella.style.animationDelay = Math.random() * 3 + 's';
                    
                    container.appendChild(estrella);
                }
            }
            
            // ==============================================
            // SISTEMA DE FLORES (DÍA) - CON SVG COMO ELEMENTO ÚNICO
            // ==============================================
            
            let floresActivas = false;
            let intervaloFlores;
            let intervaloRosas;
            let intervaloTulipanes;
            
            function controlarFlores(activar) {
                if (activar && !floresActivas) {
                    // Activar flores
                    floresActivas = true;
                    crearFloresIniciales();

            function explotarFlor(event, flor) {
                event.preventDefault();

                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;

                explosion.innerHTML = '❤️';
                explosion.style.left = x + 'px';
                explosion.style.top = y + 'px';
                
                document.body.appendChild(explosion);
                
                // Crear partículas de corazón
                const numParticulas = 12;
                for (let i = 0; i < numParticulas; i++) {
                    setTimeout(() => {
                        const particula = document.createElement('div');

                        particula.style.left = x + 'px';
                        particula.style.top = y + 'px';
                        
                        // Dirección aleatoria

                        const distancia = 60 + Math.random() * 120;
                        const tx = Math.cos(angulo) * distancia;
                        const ty = Math.sin(angulo) * distancia;
                        
                        particula.style.setProperty('--tx', tx + 'px');
                        particula.style.setProperty('--ty', ty + 'px');
                        
                        document.body.appendChild(particula);
                        
                        // Eliminar partícula después de la animación
                        setTimeout(() => {
                            if (particula.parentNode) {
                                particula.parentNode.removeChild(particula);
                            }
                        }, 1500);
                    }, i * 30);
                }
                
                // Eliminar flor
                if (flor.parentNode) {
                    flor.parentNode.removeChild(flor);
                }
                
                // Eliminar explosión principal después de la animación

                    if (explosion.parentNode) {
                        explosion.parentNode.removeChild(explosion);
                    }

            });
            
            $('.envelope').on('mouseup mouseleave', function(event) {
                detenerPulsacion(event);
            });
            
            $('.envelope').click(function(event) {
                // Si estamos en medio de una pulsación, ignorar el clic
                if (pulsacionActiva) {
                    event.preventDefault();
                    event.stopPropagation();
                    return;
                }
                
                // Si el sobre está cerrado, abrirlo
                if (!sobreAbierto) {
                    abrirSobre();
                } else {
                    // Si está abierto, cerrarlo
                    iniciarCierre();
                }
            });
            
            // Para touch (móvil) - LÓGICA MEJORADA
            const envelopeElement = document.querySelector('.envelope');
            
            envelopeElement.addEventListener('touchstart', function(event) {
                event.preventDefault();
                
                // Solo iniciar pulsación si NO está abierto el sobre
                if (!sobreAbierto && !animando) {
                    iniciarPulsacion(event);
                }
            }, { passive: false });
            
            envelopeElement.addEventListener('touchend', function(event) {
                event.preventDefault();
                
                // Verificar si fue una pulsación larga
                if (pulsacionActiva) {
                    const touchDuration = Date.now() - touchStartTime;
                    
                    // Si fue una pulsación corta (menos de 300ms), abrir/cerrar el sobre
                    if (touchDuration < 300) {
                        detenerPulsacion(event);
                        
                        // Pequeño delay para evitar conflictos
                        setTimeout(() => {
                            if (!sobreAbierto) {
                                abrirSobre();
                            } else {
                                iniciarCierre();
                            }
                        }, 50);
                    } else {
                        // Si fue más larga, solo detener la pulsación
                        detenerPulsacion(event);
                    }
                } else {
                    // Si no hay pulsación activa, manejar normalmente
                    if (!sobreAbierto) {
                        abrirSobre();
                    } else {
                        iniciarCierre();
                    }
                }
            }, { passive: false });
            
            envelopeElement.addEventListener('touchcancel', function(event) {
                event.preventDefault();
                detenerPulsacion(event);
            }, { passive: false });
            
            // ==============================================
            // SISTEMA DE MÚSICA AVANZADO (sin cambios)
            // ==============================================
            
            const songs = [
                {
                    id: 1,
                    title: "Sonríe",
                    artist: "Música para ti",
                    element: document.getElementById('song1'),
                    button: $('.song-btn[data-song="1"]')
                },
                {
                    id: 2,
                    title: "Love",
                    artist: "Canción romántica",
                    element: document.getElementById('song2'),
                    button: $('.song-btn[data-song="2"]')
                },
                {
                    id: 3,
                    title: "I Adore You",
                    artist: "Para sonreír",
                    element: document.getElementById('song3'),
                    button: $('.song-btn[data-song="3"]')
                }
            ];
            
            let currentSongIndex = 0;
            let isPlaying = false;
            let wasPlayingBeforeHidden = false;
            const musicNotification = document.getElementById('musicNotification');
            
            function changeSong(songIndex) {
                songs[currentSongIndex].element.pause();
                songs[currentSongIndex].button.removeClass('active');
                
                currentSongIndex = songIndex;
                const currentSong = songs[currentSongIndex];
                
                currentSong.button.addClass('active');
                $('#currentSongTitle').text(currentSong.title);
                $('#currentSongArtist').text(currentSong.artist);
                
                if (isPlaying) {
                    currentSong.element.currentTime = 0;
                    currentSong.element.play().then(() => {
                        $('#playPauseBtn i').removeClass('fa-play').addClass('fa-pause');
                    }).catch(error => {
                        console.log("Error al reproducir:", error);
                    });
                }
                
                localStorage.setItem('selectedSong', currentSongIndex);
            }
            
            function togglePlayPause() {
                const currentSong = songs[currentSongIndex];
                const playPauseIcon = $('#playPauseBtn i');
                
                if (isPlaying) {
                    currentSong.element.pause();
                    playPauseIcon.removeClass('fa-pause').addClass('fa-play');
                    showNotification("Música pausada");
                } else {
                    currentSong.element.play().then(() => {
                        playPauseIcon.removeClass('fa-play').addClass('fa-pause');
                        showNotification(`Reproduciendo: ${currentSong.title}`);
                    }).catch(error => {
                        console.log("Error al reproducir:", error);
                        showNotification("Haz clic en el sobre primero para activar la música");
                        isPlaying = false;
                    });
                }
                
                isPlaying = !isPlaying;
                localStorage.setItem('musicPlaying', isPlaying);
            }
            
            function showNotification(message) {
                musicNotification.textContent = message;
                musicNotification.classList.add('show');
                
                setTimeout(function() {
                    musicNotification.classList.remove('show');
                }, 3000);
            }
            
            function updateVolume(value) {
                const volume = value / 100;
                songs.forEach(song => {
                    song.element.volume = volume;
                });
                localStorage.setItem('musicVolume', value);
            }
            
            function initializePlayer() {
                const savedSong = localStorage.getItem('selectedSong');
                const savedVolume = localStorage.getItem('musicVolume');
                const savedPlaying = localStorage.getItem('musicPlaying');
                
                if (savedSong !== null) {
                    changeSong(parseInt(savedSong));
                } else {
                    songs[currentSongIndex].button.addClass('active');
                    $('#currentSongTitle').text(songs[currentSongIndex].title);
                    $('#currentSongArtist').text(songs[currentSongIndex].artist);
                }
                
                if (savedVolume !== null) {
                    $('#volumeSlider').val(savedVolume);
                    updateVolume(savedVolume);
                } else {
                    updateVolume(50);
                }
                
                if (savedPlaying === 'true') {
                    isPlaying = true;
                    $('#playPauseBtn i').removeClass('fa-play').addClass('fa-pause');
                    setTimeout(() => {
                        songs[currentSongIndex].element.play().catch(e => {
                            console.log("No se pudo reproducir automáticamente:", e);
                            isPlaying = false;
                            $('#playPauseBtn i').removeClass('fa-pause').addClass('fa-play');
                        });
                    }, 500);
                }
                
                songs.forEach((song, index) => {
                    song.element.addEventListener('ended', () => {
                        if (isPlaying) {
                            song.element.currentTime = 0;
                            song.element.play();
                        }
                    });
                    
                    song.element.addEventListener('pause', () => {
                        if (isPlaying && currentSongIndex === index) {
                            isPlaying = false;
                            $('#playPauseBtn i').removeClass('fa-pause').addClass('fa-play');
                        }
                    });
                    
                    song.element.addEventListener('play', () => {
                        if (!isPlaying && currentSongIndex === index) {
                            isPlaying = true;
                            $('#playPauseBtn i').removeClass('fa-play').addClass('fa-pause');
                        }
                    });
                });
            }
            
            $('.song-btn').click(function() {
                const songIndex = parseInt($(this).data('song')) - 1;
                changeSong(songIndex);
            });
            
            $('#playPauseBtn').click(function() {
                togglePlayPause();
            });
            
            $('#volumeSlider').on('input', function() {
                updateVolume($(this).val());
            });
            
            $('#musicControl').click(function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if ($('#musicPlayer').is(':visible')) {
                    $('#musicPlayer').slideUp(200);
                } else {
                    $('#musicPlayer').slideDown(200);
                }
                
                $(this).toggleClass('pulsing');
                
                return false;
            });
            
            $('#musicControl').on('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if ($('#musicPlayer').is(':visible')) {
                    $('#musicPlayer').slideUp(200);
                } else {
                    $('#musicPlayer').slideDown(200);
                }
                
                $(this).toggleClass('pulsing');
                return false;
            });
            
            $('#musicControl').on('touchmove', function(e) {
                e.preventDefault();
            });
            
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    if (isPlaying) {
                        wasPlayingBeforeHidden = true;
                        songs[currentSongIndex].element.pause();
                    }
                } else {
                    if (wasPlayingBeforeHidden) {
                        wasPlayingBeforeHidden = false;
                        if (isPlaying) {
                            songs[currentSongIndex].element.play().catch(console.error);
                        }
                    }
                }
            });
            
            window.addEventListener('blur', function() {
                if (isPlaying) {
                    wasPlayingBeforeHidden = true;
                    songs[currentSongIndex].element.pause();
                }
            });
            
            window.addEventListener('focus', function() {
                if (wasPlayingBeforeHidden && isPlaying) {
                    wasPlayingBeforeHidden = false;
                    songs[currentSongIndex].element.play().catch(console.error);
                }
            });
            
            // ==============================================
            // SISTEMA DE REGISTRO LOCAL DE VISITAS (simplificado)
            // ==============================================
            
            async function registrarVisitaLocal(mensaje, emoji) {
                try {
                    const visita = {
                        fecha: new Date().toLocaleDateString('es-ES'),
                        hora: new Date().toLocaleTimeString('es-ES'),
                        timestamp: Date.now(),
                        mensaje: mensaje,
                        emoji: emoji
                    };
                    
                    console.log('📝 Registrando visita local:', visita);
                    
                    guardarVisitaLocalStorage(visita);
                    
                } catch (error) {
                    console.error('Error al registrar visita local:', error);
                }
            }
            
            function guardarVisitaLocalStorage(visita) {
                try {
                    let historial = JSON.parse(localStorage.getItem('historial_visitas') || '[]');
                    historial.push(visita);
                    
                    if (historial.length > 100) {
                        historial = historial.slice(-100);
                    }
                    
                    localStorage.setItem('historial_visitas', JSON.stringify(historial));
                    localStorage.setItem('ultima_visita', JSON.stringify(visita));
                    
                } catch (error) {
                    console.error('Error al guardar visita local:', error);
                }
            }
            
            function verEstadisticas() {
                const historial = JSON.parse(localStorage.getItem('historial_visitas') || '[]');
                
                console.clear();
                console.log('%c📊 ===== ESTADÍSTICAS LOCALES =====', 'color: #ff5252; font-size: 16px; font-weight: bold');
                console.log(`%cTotal mensajes vistos: ${historial.length}`, 'color: #4CAF50');
                
                if (historial.length > 0) {
                    const porFecha = {};
                    historial.forEach(v => {
                        porFecha[v.fecha] = (porFecha[v.fecha] || 0) + 1;
                    });
                    
                    console.log('\n%c📅 VISITAS POR FECHA:', 'color: #9C27B0; font-weight: bold');
                    Object.entries(porFecha).forEach(([fecha, count]) => {
                        console.log(`   ${fecha}: ${count} mensaje(s)`);
                    });
                    
                    console.log('\n%c📋 ÚLTIMOS MENSAJES:', 'color: #FF9800; font-weight: bold');
                    historial.slice(-15).reverse().forEach((visita, index) => {
                        const num = historial.length - index;
                        console.log(`\n${num}. ${visita.fecha} - ${visita.hora}`);
                        console.log(`   💌 "${visita.mensaje}" ${visita.emoji}`);
                    });
                }
                
                showNotification("Estadísticas mostradas en consola");
            }
            
            // ==============================================
            // INICIALIZACIÓN
            // ==============================================
            
            function inicializarTodo() {
                // Inicializar cielo
                crearEstrellas();
                actualizarCielo();
                
                // Actualizar cielo cada minuto
                setInterval(actualizarCielo, 60000);
                
                // Inicializar reproductor
                initializePlayer();
                
                // Registrar visita inicial
                if (!sessionStorage.getItem('visita_registrada')) {
                    registrarVisitaLocal('Página cargada', '📱');
                    sessionStorage.setItem('visita_registrada', 'true');
                }
                
                // Mostrar notificación inicial
                showNotification("¡Descubre mensajes especiales!");
                showNotification("💡 Mantén pulsado el sobre 3 segundos para un corazón especial");
                $('#musicControl').addClass('pulsing');
                
                setTimeout(function() {
                    $('#musicControl').removeClass('pulsing');
                }, 10000);
                
                // Mostrar información en consola
                console.log('🎵 REPRODUCTOR DE MÚSICA - 3 canciones');
                console.log('🌞 SISTEMA DE SOL Y LUNA ACTIVO (sol ajustado)');
                console.log('🌹 FLORES DE DÍA - METEORITOS DE NOCHE');
                console.log('   - Día (8:00-18:00): Flores (rosas y tulipanes)');
                console.log('   - Noche (18:00-8:00): Meteoritos');
                console.log('💥 ¡Haz clic en flores o meteoritos para convertirlos en corazones!');
                console.log('💖 NUEVO: ¡Mantén pulsado el sobre 3 segundos para un corazón especial!');
                console.log('📱 MÓVIL: Touch corto = abrir/cerrar sobre | Touch largo (3s) = corazón especial');
                console.log('📊 SISTEMA DE VISITAS LOCAL ACTIVO');
                console.log('• Para ver estadísticas: verEstadisticas()');
                console.log('• Para crear flor de prueba: crearFlorTest()');
                console.log('• Para crear meteorito de prueba: crearMeteoritoTest()');
                
                // Hacer funciones accesibles desde consola
                window.verEstadisticas = verEstadisticas;
                window.crearFlorTest = crearFlorTest;
                window.crearMeteoritoTest = crearMeteoritoTest;
            }
            
            // Iniciar cuando el DOM esté listo
            setTimeout(inicializarTodo, 2000);
        });
    </script>
