<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Especial</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Importar fuente Pacifico de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <!-- Iconos para el botón de música -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* Mejoras para móvil */
        html, body {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            touch-action: manipulation;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        /* FONDO DEL CIELO (implementación del sol y la luna) */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #1a2980, #26d0ce); /* Gradiente azul más neutro */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Contenedor del cielo */
        #cieloContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Sol y luna - versión simplificada para fondo */
        #sol {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            margin: -75px 0 0 -75px;
            background: radial-gradient(circle, #ffeb3b 0%, #ff9800 70%, #ff5722 100%);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255, 235, 59, 0.7), 0 0 200px rgba(255, 152, 0, 0.4);
            z-index: 1;
            opacity: 0.9;
            transition: all 2s ease;
        }

        #luna {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            margin: -60px 0 0 -60px;
            background: radial-gradient(circle, #e0f7fa 0%, #b2ebf2 40%, #80deea 70%, #4dd0e1 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(224, 247, 250, 0.6), 0 0 150px rgba(178, 235, 242, 0.3);
            z-index: 1;
            opacity: 0;
            transition: all 2s ease;
        }

        #estrellasContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .estrella {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Capa de transparencia para el contenido */
        #contenidoWrapper {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #wrapper {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
            text-align: center;
        }
        
        /* Botón de música flotante */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 82, 82, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: 2px solid white;
        }
        
        .music-control:hover {
            background: rgba(255, 82, 82, 1);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .music-control i {
            font-size: 24px;
            color: white;
        }
        
        .music-control.playing i {
            color: #ffeb3b;
        }
        
        .music-control.pulsing {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }
        
        /* Reproductor de música - AJUSTADO PARA PC */
        .music-player {
            position: fixed;
            bottom: 20px; /* MUCHO MÁS ABAJO en PC */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px;
            width: 90%;
            max-width: 300px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            z-index: 100;
        }
        
        .song-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 6px;
        }
        
        .song-btn {
            flex: 1;
            padding: 6px 8px;
            background: rgba(255, 82, 82, 0.8);
            border: none;
            border-radius: 20px;
            color: white;
            font-family: 'Pacifico', cursive;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .song-btn:hover {
            background: rgba(255, 82, 82, 1);
            transform: translateY(-2px);
        }
        
        .song-btn.active {
            background: #ffeb3b;
            color: #1c258b;
            box-shadow: 0 2px 10px rgba(255, 235, 59, 0.4);
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .play-pause-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 82, 82, 0.9);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .play-pause-btn:hover {
            background: rgba(255, 82, 82, 1);
            transform: scale(1.1);
        }
        
        .song-info {
            flex: 1;
            text-align: left;
        }
        
        .song-title {
            color: white;
            font-size: 12px;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .song-artist {
            color: rgba(255, 255, 255, 0.7);
            font-size: 10px;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
        }
        
        .volume-control i {
            color: white;
            font-size: 14px;
        }
        
        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff5252;
            cursor: pointer;
        }
        
        /* Notificación de música */
        .music-notification {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            max-width: 200px;
            z-index: 999;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            text-align: center;
        }
        
        .music-notification.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* EL SOBRE (CONTENEDOR) - Color rojo elegante */
        .envelope {
            width: 200px;
            height: 100px;
            margin: 0 auto;
            background: linear-gradient(145deg, #b92424, #ff5252);
            box-shadow: 
                0 0 1px rgba(0,0,0,0.3),
                0 4px 20px rgba(0,0,0,0.25),
                0 15px 40px rgba(255, 82, 82, 0.3),
                0 0 80px rgba(255, 82, 82, 0.15);
            position: relative;
            perspective: 800px;
            cursor: pointer;
            border-radius: 2px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .envelope:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 0 1px rgba(0,0,0,0.3),
                0 6px 25px rgba(0,0,0,0.3),
                0 20px 50px rgba(255, 82, 82, 0.35),
                0 0 100px rgba(255, 82, 82, 0.2);
        }
        
        .envelope:active {
            transform: translateY(0);
        }
        
        .envelope:after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border: 0 solid rgba(0,0,0,0.15);
            border-width: 45px 100px;
            border-top-color: transparent;
            z-index: 2;
        }
        
        .envelope .flap {
            position: absolute;
            width: 100%;
            height: 0;
            border: 0 solid transparent;
            border-width: 50px 100px;
        }
        
        .envelope .flap.front {
            border-left-color: #e26060;
            border-right-color: #e26060;
            border-bottom-color: #e74c3c;
            z-index: 3;
        }
        
        .envelope .flap.front:after {
            content: '';
            width: 100%;
            height: 0;
            position: absolute;
            left: -100px;
            bottom: -50px;
            border: 0 solid transparent;
            border-width: 49px 100px;
            border-bottom-color: #e26060;
        }
        
        .envelope .flap.top {
            border-top-width: 55px;
            border-top-color: #e74c3c;
            z-index: 3;
            animation-duration: 1s;
            animation-fill-mode: forwards;
            transform-origin: top;
            transform-style: preserve-3d;
        }
        
        .envelope.open .flap.top {
            animation-name: flip;
        }
        
        .envelope.closing-step4 .flap.top {
            animation-name: flip-reverse;
            animation-delay: 0s;
        }
        
        .envelope .flap.top:after {
            content: '';
            position: absolute;
            left: -100px;
            top: -55px;
            width: 100%;
            height: 0;
            border: 0 solid transparent;
            border-width: 54px 100px;
            border-top-color: #d33b3b;
        }
        
        .envelope.letter-open .flap.top {
            transform: rotateX(180deg);
            z-index: 1 !important; 
        }
        
        .envelope.closing-step1 .flap.top,
        .envelope.closing-step2 .flap.top,
        .envelope.closing-step3 .flap.top {
            transform: rotateX(180deg);
            z-index: 1 !important;
        }
        
        /* LA CARTA */
        .envelope .letter {
            position: absolute;
            width: 194px;
            height: 84px;
            background: linear-gradient(to bottom, #fff9f9, #fff);
            top: 8px;
            left: 3px;
            border: 1px solid rgba(255, 107, 107, 0.3);
            z-index: 1;
            animation-duration: 2s;
            animation-delay: 1.5s;
            animation-fill-mode: forwards;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(255, 107, 107, 0.1);
            border-radius: 1px;
        }

        /* --- ESTILOS DEL TEXTO CON FUENTE PACIFICO --- */
        .letter-content {
            font-family: 'Pacifico', cursive;
            font-size: 15px;
            color: #5d4037;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: center;
            pointer-events: none;
            padding: 8px 10px;
            z-index: 10;
            position: relative;
            line-height: 1.4;
            text-shadow: 0.5px 0.5px 1px rgba(0,0,0,0.1);
            letter-spacing: 0.2px;
            font-weight: normal;
        }

        /* --- EMOJIS POSICIONADOS EN EL SOBRE (NO EN LA CARTA) --- */
        .emoji-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .emoji-top, .emoji-bottom {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.3s ease;
            z-index: 15;
            pointer-events: none;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
        }

        .emoji-top {
            top: -35px;
        }

        .emoji-bottom {
            bottom: -35px;
        }

        /* Mostrar texto y emojis simultáneamente */
        .envelope.show-text .letter-content,
        .envelope.show-text .emoji-top,
        .envelope.show-text .emoji-bottom {
            opacity: 1;
        }
        
        .envelope.show-text .emoji-top {
            animation: floatUp 2s ease-in-out infinite;
        }
        
        .envelope.show-text .emoji-bottom {
            animation: floatDown 2s ease-in-out infinite;
        }
        
        /* ANIMACIONES DE LA CARTA */
        .envelope.open .letter {
            animation-name: remove;
        }
        
        .envelope.closing-step3 .letter {
            animation-name: return;
            animation-delay: 0s;
            animation-duration: 1.5s;
            z-index: 1;
        }
        
        .envelope.letter-open .letter {
            top: 8px;
            z-index: 4 !important;
            animation: none !important;
        }
        
        .envelope.closing-step1 .letter,
        .envelope.closing-step2 .letter {
            z-index: 4 !important;
        }
        
        /* PLIEGUES DE LA CARTA */
        .envelope .letter:before,
        .envelope .letter:after {
            content: '';
            position: absolute;
            width: 192px;
            height: 75%;
            left: -1px;
            background: linear-gradient(to bottom, #fff9f9, #fff);
            border: 1px solid rgba(255, 107, 107, 0.3);
            animation-duration: 1s;
            animation-fill-mode: forwards;
            transform-origin: top;
            transform-style: preserve-3d;
        }
        
        .envelope .letter:before {
            z-index: 2;
            transform: rotateX(10deg);
        }
        
        .envelope.open .letter:before {
            animation-name: fold-up;
            animation-delay: 3.5s;
        }
        
        .envelope.closing-step2 .letter:before {
            animation-name: fold-up-reverse;
            animation-delay: 0s;
        }
        
        .envelope.letter-open .letter:before {
            transform: rotateX(140deg);
            animation: none !important;
        }
        
        .envelope.closing-step1 .letter:before {
            transform: rotateX(140deg) !important;
            animation: none !important;
        }
        
        .envelope .letter:after {
            z-index: 2;
            transform-origin: bottom;
            transform: rotateX(-5deg);
            bottom: 0;
        }
        
        .envelope.open .letter:after {
            animation-name: fold-down;
            animation-delay: 4.5s;
        }
        
        .envelope.closing-step1 .letter:after {
            animation-name: fold-down-reverse;
            animation-delay: 0s;
        }
        
        .envelope.letter-open .letter:after {
            transform: rotateX(-140deg);
            animation: none !important;
        }
        
        /* --- KEYFRAMES --- */
        @keyframes flip { 
            100% { transform: rotateX(180deg); z-index: 1; } 
        }
        
        @keyframes flip-reverse { 
            0% { transform: rotateX(180deg); z-index: 1; } 
            100% { transform: rotateX(0deg); z-index: 3; } 
        }
        
        @keyframes remove { 
            0% { top: 8px; z-index: 1; } 
            50% { top: -120px; z-index: 4; } 
            100% { top: 8px; z-index: 4; } 
        }
        
        @keyframes return { 
            0% { top: 8px; z-index: 4; } 
            40% { top: -120px; z-index: 4; } 
            41% { top: -120px; z-index: 1; } 
            100% { top: 8px; z-index: 1; } 
        }
        
        @keyframes fold-up { 
            0% { transform: rotateX(10deg); } 
            100% { transform: rotateX(140deg); } 
        }
        
        @keyframes fold-up-reverse { 
            0% { transform: rotateX(140deg); } 
            100% { transform: rotateX(10deg); } 
        }
        
        @keyframes fold-down { 
            0% { transform: rotateX(-5deg); } 
            100% { transform: rotateX(-140deg); } 
        }
        
        @keyframes fold-down-reverse { 
            0% { transform: rotateX(-140deg); } 
            100% { transform: rotateX(-5deg); } 
        }
        
        @keyframes floatUp {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        
        @keyframes floatDown {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(5px); }
        }

        /* Animaciones específicas para móvil */
        @keyframes floatUpMobile {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-3px); }
        }

        @keyframes floatDownMobile {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(3px); }
        }
        
        /* Media queries para móvil - CONFIGURACIÓN SEPARADA */
        @media (max-width: 768px) {
            body {
                padding: 15px;
                background: linear-gradient(to bottom, #1a237e, #2196F3);
            }
            
            #contenidoWrapper {
                padding: 15px;
            }
            
            .envelope {
                transform: scale(1.3);
                margin: 0 auto;
            }
            
            .envelope:hover {
                transform: scale(1.3) translateY(-2px);
            }
            
            .envelope:active {
                transform: scale(1.3) translateY(0);
            }
            
            .letter-content {
                font-size: 16px;
                padding: 6px 8px;
            }
            
            /* CORRECCIÓN PARA LOS EMOJIS EN MÓVIL */
            .emoji-top, .emoji-bottom {
                font-size: 18px;
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
            }
            
            /* Ajustar posición del emoji superior para que no se salga */
            .emoji-top {
                top: -28px;
            }
            
            .emoji-bottom {
                bottom: -28px;
            }
            
            /* Ajustar las animaciones para la nueva posición */
            .envelope.show-text .emoji-top {
                animation: floatUpMobile 2s ease-in-out infinite;
            }
            
            .envelope.show-text .emoji-bottom {
                animation: floatDownMobile 2s ease-in-out infinite;
            }
            
            /* Ajustes para el botón de música en móvil */
            .music-control {
                bottom: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
            }
            
            .music-control i {
                font-size: 20px;
            }
            
            /* REPRODUCTOR DE MÚSICA - POSICIÓN DIFERENTE EN MÓVIL */
            .music-player {
                bottom: 70px !important; /* MÁS ARRIBA en móvil */
                max-width: 280px;
                padding: 8px;
                border-radius: 10px;
            }
            
            .song-selector {
                flex-direction: column;
                gap: 6px;
                margin-bottom: 8px;
            }
            
            .song-btn {
                padding: 8px;
                font-size: 11px;
                border-radius: 18px;
            }
            
            .player-controls {
                gap: 8px;
                margin-bottom: 6px;
            }
            
            .play-pause-btn {
                width: 32px;
                height: 32px;
            }
            
            .song-title {
                font-size: 11px;
            }
            
            .song-artist {
                font-size: 9px;
            }
            
            .volume-control {
                gap: 5px;
                margin-top: 2px;
            }
            
            .volume-control i {
                font-size: 12px;
            }
            
            .volume-slider {
                height: 2px;
            }
            
            .volume-slider::-webkit-slider-thumb {
                width: 12px;
                height: 12px;
            }
            
            /* Notificación de música en móvil */
            .music-notification {
                bottom: 120px;
                right: 15px;
                font-size: 12px;
                max-width: 180px;
                padding: 8px 12px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            #contenidoWrapper {
                padding: 12px;
            }
            
            .envelope {
                transform: scale(1.2);
            }
            
            .envelope:hover {
                transform: scale(1.2) translateY(-2px);
            }
            
            .envelope:active {
                transform: scale(1.2) translateY(0);
            }
            
            .letter-content {
                font-size: 15px;
            }
            
            /* Ajustar aún más para pantallas muy pequeñas */
            .emoji-top, .emoji-bottom {
                font-size: 16px;
            }
            
            .emoji-top {
                top: -25px;
            }
            
            .emoji-bottom {
                bottom: -25px;
            }
            
            /* Ajustes para pantallas muy pequeñas */
            .music-control {
                bottom: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
            }
            
            .music-control i {
                font-size: 18px;
            }
            
            /* REPRODUCTOR AÚN MÁS COMPACTO para pantallas muy pequeñas */
            .music-player {
                max-width: 260px;
                padding: 6px;
                border-radius: 8px;
            }
            
            .song-btn {
                font-size: 10px;
                padding: 6px;
            }
            
            .play-pause-btn {
                width: 30px;
                height: 30px;
            }
            
            .song-title {
                font-size: 10px;
            }
            
            .song-artist {
                font-size: 8px;
            }
            
            .music-notification {
                bottom: 60px;
                right: 10px;
                font-size: 11px;
                max-width: 160px;
                padding: 6px 10px;
            }
        }
        
        /* Media query solo para escritorio (más de 768px) */
        @media (min-width: 769px) {
            .music-player {
                bottom: 20px; /* ABAJO DEL TODO en PC */
            }
            
            .music-notification {
                bottom: 80px; /* Justo arriba del botón de música */
            }
        }
    </style>
</head>
<body>
    <!-- Contenedor del cielo con sol y luna -->
    <div id="cieloContainer">
        <div id="sol"></div>

    <script>
        $(document).ready(function() {
            // ==============================================
            // SISTEMA DE SOL Y LUNA SEGÚN LA HORA
            // ==============================================
            
            function actualizarCielo() {
                const ahora = new Date();
                const hora = ahora.getHours();
                const minuto = ahora.getMinutes();
                const segundo = ahora.getSeconds();
                
                // Calcular el porcentaje del día (0 = medianoche, 0.5 = mediodía, 1 = medianoche siguiente)
                const totalSegundos = hora * 3600 + minuto * 60 + segundo;
                const porcentajeDia = totalSegundos / 86400; // 86400 segundos en un día
                
                // Calcular posición del sol (6:00 AM a 6:00 PM)
                const amanecer = 6; // 6:00 AM
                const atardecer = 18; // 6:00 PM
                
                const sol = document.getElementById('sol');
                const luna = document.getElementById('luna');
                const estrellas = document.getElementById('estrellasContainer');
                
                if (hora >= amanecer && hora < atardecer) {
                    // ES DE DÍA
                    const duracionDia = atardecer - amanecer;
                    const horaActualDia = hora + minuto/60 - amanecer;
                    const progresoDia = horaActualDia / duracionDia;
                    
                    // Posición del sol en el cielo (arco) - AJUSTADO MÁS ARRIBA
                    const angulo = progresoDia * Math.PI; // 0 a π radianes
                    
                    // Coordenadas para el arco del sol - MÁS ARRIBA (de 10% a 40% de altura)
                    const x = 50 + Math.sin(angulo) * 40; // 10% a 90% del ancho
                    const y = 10 + Math.cos(angulo) * 40; // AJUSTADO: 10% a 50% de la altura (más arriba)
                    
                    // Estilo del sol
                    sol.style.left = x + '%';
                    sol.style.top = y + '%';
                    
                    // Tamaño y opacidad del sol según la hora
                    let tamanoSol = 150;
                    let opacidadSol = 0.9;
                    let brilloSol = 0.7;
                    
                    if (hora < amanecer + 1 || hora > atardecer - 1) {
                        // Amanecer o atardecer
                        tamanoSol = 180;
                        opacidadSol = 0.6;
                        brilloSol = 0.5;
                        sol.style.background = 'radial-gradient(circle, #ff9800 0%, #ff5722 70%, #d84315 100%)';
                    } else if (hora >= 11 && hora <= 13) {
                        // Mediodía
                        tamanoSol = 130;
                        opacidadSol = 1;
                        brilloSol = 0.9;
                        sol.style.background = 'radial-gradient(circle, #ffeb3b 0%, #ffc107 70%, #ff9800 100%)';
                    } else {
                        sol.style.background = 'radial-gradient(circle, #ffeb3b 0%, #ff9800 70%, #ff5722 100%)';
                    }
                    
                    sol.style.width = tamanoSol + 'px';
                    sol.style.height = tamanoSol + 'px';
                    sol.style.margin = '-' + (tamanoSol/2) + 'px 0 0 -' + (tamanoSol/2) + 'px';
                    sol.style.opacity = opacidadSol;
                    sol.style.boxShadow = '0 0 ' + (tamanoSol/2) + 'px rgba(255, 235, 59, ' + brilloSol + '), 0 0 ' + (tamanoSol*1.5) + 'px rgba(255, 152, 0, 0.4)';
                    
                    // Mostrar sol, ocultar luna y estrellas
                    sol.style.display = 'block';
                    luna.style.display = 'none';
                    estrellas.style.opacity = 0;
                    
                } else {
                    // ES DE NOCHE
                    let duracionNoche;
                    let horaActualNoche;
                    
                    if (hora < amanecer) {
                        duracionNoche = amanecer + (24 - atardecer);
                        horaActualNoche = hora + 24 - atardecer;
                    } else {
                        duracionNoche = amanecer + (24 - atardecer);
                        horaActualNoche = hora - atardecer;
                    }
                    
                    const progresoNoche = horaActualNoche / duracionNoche;
                    const angulo = progresoNoche * Math.PI;
                    
                    // Coordenadas para el arco de la luna - AJUSTADO MÁS ARRIBA
                    const x = 50 + Math.sin(angulo) * 40;
                    const y = 10 + Math.cos(angulo) * 40; // AJUSTADO: 10% a 50% de la altura (más arriba)
                    
                    // Estilo de la luna
                    luna.style.left = x + '%';
                    luna.style.top = y + '%';
                    
                    // Tamaño y opacidad de la luna según la hora
                    const tamanoLuna = 120;
                    const opacidadLuna = 0.8 - Math.abs(12 - hora) * 0.05;
                    const brilloLuna = 0.6 - Math.abs(12 - hora) * 0.05;
                    
                    luna.style.width = tamanoLuna + 'px';
                    luna.style.height = tamanoLuna + 'px';
                    luna.style.margin = '-' + (tamanoLuna/2) + 'px 0 0 -' + (tamanoLuna/2) + 'px';
                    luna.style.opacity = Math.max(0.3, opacidadLuna);
                    luna.style.boxShadow = '0 0 ' + (tamanoLuna/2) + 'px rgba(224, 247, 250, ' + brilloLuna + '), 0 0 ' + (tamanoLuna*1.5) + 'px rgba(178, 235, 242, 0.3)';
                    
                    // Mostrar luna y estrellas, ocultar sol
                    sol.style.display = 'none';
                    luna.style.display = 'block';
                    
                    // Estrellas - más visibles cuanto más tarde/antes sea
                    const opacidadEstrellas = 0.1 + Math.abs(0 - hora) * 0.03;
                    estrellas.style.opacity = Math.min(0.8, opacidadEstrellas);
                }
                
                // Actualizar fondo del body según la hora
                let colorInicio, colorFin;
                
                if (hora >= 5 && hora < 8) {
                    // Amanecer
                    colorInicio = '#1a2980';
                    colorFin = '#26d0ce';
                } else if (hora >= 8 && hora < 16) {
                    // Día
                    colorInicio = '#87CEEB';
                    colorFin = '#E0F7FA';
                } else if (hora >= 16 && hora < 19) {
                    // Atardecer
                    colorInicio = '#FF9800';
                    colorFin = '#1a2980';
                } else {
                    // Noche
                    colorInicio = '#0A192F';
                    colorFin = '#1a2980';
                }
                
                document.body.style.background = `linear-gradient(to bottom, ${colorInicio}, ${colorFin})`;
            }

                    estrella.style.width = tamaño + 'px';
                    estrella.style.height = tamaño + 'px';
                    
                    // Posición aleatoria
                    estrella.style.left = Math.random() * 100 + '%';
                    estrella.style.top = Math.random() * 100 + '%';
                    
                    // Opacidad aleatoria
                    estrella.style.opacity = Math.random() * 0.7 + 0.3;
                    
                    // Retraso de animación aleatorio
                    estrella.style.animationDelay = Math.random() * 3 + 's';
                    
                    container.appendChild(estrella);

            function obtenerTextoYEmojiAleatorio() {
                if (textosDisponibles.length === 0) {
                    textosDisponibles = [...textosConEmojis];
                }
                
                const indice = Math.floor(Math.random() * textosDisponibles.length);
                const textoElegido = textosDisponibles.splice(indice, 1)[0];
                
                return textoElegido;

            function verificarMensajesSeguidos() {
                const ahora = Date.now();
                
                if (ahora - ultimoMensajeTiempo < 10000) {
                    mensajesSeguidos++;
                } else {
                    mensajesSeguidos = 0;
                }
                
                ultimoMensajeTiempo = ahora;
            }
            
            function abrirSobre() {
                if (animando) return;
                animando = true;
                animacionAbiertaCompleta = false;
                
                const contenido = obtenerTextoYEmojiAleatorio();
                
                $('#texto-carta').text(contenido.texto);
                $('#emoji-top').text(contenido.emoji);
                $('#emoji-bottom').text(contenido.emoji);
                
                verificarMensajesSeguidos();
                
                registrarVisitaLocal(contenido.texto, contenido.emoji);
                
                $('.envelope').removeClass('letter-open closing-step1 closing-step2 closing-step3 closing-step4 show-text');
                $('.envelope').addClass('open');
                sobreAbierto = true;
                
                setTimeout(function() {
                    $('.envelope').removeClass('open').addClass('letter-open');
                    
                    setTimeout(function() {
                        $('.envelope').addClass('show-text');
                        animacionAbiertaCompleta = true;
                        animando = false;
                    }, 500);
                }, 6000);
            }
            
            function iniciarCierre() {
                if (animando || !sobreAbierto) return;
                animando = true;
                
                $('.envelope').removeClass('show-text');
                
                setTimeout(function() {
                    if (!animacionAbiertaCompleta) {
                        $('.envelope').removeClass('open').addClass('letter-open');
                    }
                    
                    $('.envelope').removeClass('letter-open').addClass('closing-step1');
                    
                    setTimeout(function() {
                        $('.envelope').removeClass('closing-step1').addClass('closing-step2');
                        
                        setTimeout(function() {
                            $('.envelope').removeClass('closing-step2').addClass('closing-step3');
                            
                            setTimeout(function() {
                                $('.envelope').removeClass('closing-step3').addClass('closing-step4');
                                sobreAbierto = false;
                                animacionAbiertaCompleta = false;
                                
                                setTimeout(function() {
                                    $('.envelope').removeClass('closing-step4');
                                    $('#texto-carta').text('');
                                    $('#emoji-top').text('');
                                    $('#emoji-bottom').text('');
                                    animando = false;
                                }, 1000);
                            }, 1500);
                        }, 1000);
                    }, 1000);
                }, 500);
            }

                if (sobreAbierto) iniciarCierre();
                else abrirSobre();

                else abrirSobre();

            // ==============================================
            // SISTEMA DE MÚSICA AVANZADO (con ajuste de posición)
            // ==============================================
            
            const songs = [
                {
                    id: 1,
                    title: "Sonríe",
                    artist: "Música para ti",
                    element: document.getElementById('song1'),
                    button: $('.song-btn[data-song="1"]')
                },
                {
                    id: 2,
                    title: "Love",
                    artist: "Canción romántica",
                    element: document.getElementById('song2'),
                    button: $('.song-btn[data-song="2"]')
                },
                {
                    id: 3,
                    title: "I Adore You",
                    artist: "Para sonreír",
                    element: document.getElementById('song3'),
                    button: $('.song-btn[data-song="3"]')
                }
            ];
            
            let currentSongIndex = 0;
            let isPlaying = false;
            let wasPlayingBeforeHidden = false;
            const musicNotification = document.getElementById('musicNotification');
            
            function changeSong(songIndex) {
                songs[currentSongIndex].element.pause();
                songs[currentSongIndex].button.removeClass('active');
                
                currentSongIndex = songIndex;
                const currentSong = songs[currentSongIndex];
                
                currentSong.button.addClass('active');
                $('#currentSongTitle').text(currentSong.title);
                $('#currentSongArtist').text(currentSong.artist);
                
                if (isPlaying) {
                    currentSong.element.currentTime = 0;
                    currentSong.element.play().then(() => {
                        $('#playPauseBtn i').removeClass('fa-play').addClass('fa-pause');
                    }).catch(error => {
                        console.log("Error al reproducir:", error);
                    });
                }
                
                localStorage.setItem('selectedSong', currentSongIndex);
            }
            
            function togglePlayPause() {
                const currentSong = songs[currentSongIndex];
                const playPauseIcon = $('#playPauseBtn i');
                
                if (isPlaying) {
                    currentSong.element.pause();
                    playPauseIcon.removeClass('fa-pause').addClass('fa-play');
                    showNotification("Música pausada");
                } else {
                    currentSong.element.play().then(() => {
                        playPauseIcon.removeClass('fa-play').addClass('fa-pause');
                        showNotification(`Reproduciendo: ${currentSong.title}`);
                    }).catch(error => {
                        console.log("Error al reproducir:", error);
                        showNotification("Haz clic en el sobre primero para activar la música");
                        isPlaying = false;
                    });
                }
                
                isPlaying = !isPlaying;
                localStorage.setItem('musicPlaying', isPlaying);
            }
            
            function showNotification(message) {
                musicNotification.textContent = message;
                musicNotification.classList.add('show');
                
                setTimeout(function() {
                    musicNotification.classList.remove('show');
                }, 3000);
            }
            
            function updateVolume(value) {
                const volume = value / 100;
                songs.forEach(song => {
                    song.element.volume = volume;
                });
                localStorage.setItem('musicVolume', value);
            }
            
            function initializePlayer() {
                const savedSong = localStorage.getItem('selectedSong');
                const savedVolume = localStorage.getItem('musicVolume');
                const savedPlaying = localStorage.getItem('musicPlaying');
                
                if (savedSong !== null) {
                    changeSong(parseInt(savedSong));
                } else {
                    songs[currentSongIndex].button.addClass('active');
                    $('#currentSongTitle').text(songs[currentSongIndex].title);
                    $('#currentSongArtist').text(songs[currentSongIndex].artist);
                }
                
                if (savedVolume !== null) {
                    $('#volumeSlider').val(savedVolume);
                    updateVolume(savedVolume);
                } else {
                    updateVolume(50);
                }
                
                if (savedPlaying === 'true') {
                    isPlaying = true;
                    $('#playPauseBtn i').removeClass('fa-play').addClass('fa-pause');
                    setTimeout(() => {
                        songs[currentSongIndex].element.play().catch(e => {
                            console.log("No se pudo reproducir automáticamente:", e);
                            isPlaying = false;
                            $('#playPauseBtn i').removeClass('fa-pause').addClass('fa-play');
                        });
                    }, 500);
                }
                
                songs.forEach((song, index) => {
                    song.element.addEventListener('ended', () => {
                        if (isPlaying) {
                            song.element.currentTime = 0;
                            song.element.play();
                        }
                    });
                    
                    song.element.addEventListener('pause', () => {
                        if (isPlaying && currentSongIndex === index) {
                            isPlaying = false;
                            $('#playPauseBtn i').removeClass('fa-pause').addClass('fa-play');
                        }
                    });
                    
                    song.element.addEventListener('play', () => {
                        if (!isPlaying && currentSongIndex === index) {
                            isPlaying = true;
                            $('#playPauseBtn i').removeClass('fa-play').addClass('fa-pause');
                        }
                    });
                });
            }
            
            $('.song-btn').click(function() {
                const songIndex = parseInt($(this).data('song')) - 1;
                changeSong(songIndex);
            });
            
            $('#playPauseBtn').click(function() {
                togglePlayPause();
            });
            
            $('#volumeSlider').on('input', function() {
                updateVolume($(this).val());
            });
            
            $('#musicControl').click(function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if ($('#musicPlayer').is(':visible')) {
                    $('#musicPlayer').slideUp(200);
                } else {
                    $('#musicPlayer').slideDown(200);
                }
                
                $(this).toggleClass('pulsing');
                
                return false;
            });
            
            $('#musicControl').on('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if ($('#musicPlayer').is(':visible')) {
                    $('#musicPlayer').slideUp(200);
                } else {
                    $('#musicPlayer').slideDown(200);
                }
                
                $(this).toggleClass('pulsing');
                return false;
            });
            
            $('#musicControl').on('touchmove', function(e) {
                e.preventDefault();
            });
            
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    if (isPlaying) {
                        wasPlayingBeforeHidden = true;
                        songs[currentSongIndex].element.pause();
                    }
                } else {
                    if (wasPlayingBeforeHidden) {
                        wasPlayingBeforeHidden = false;
                        if (isPlaying) {
                            songs[currentSongIndex].element.play().catch(console.error);
                        }
                    }
                }
            });
            
            window.addEventListener('blur', function() {
                if (isPlaying) {
                    wasPlayingBeforeHidden = true;
                    songs[currentSongIndex].element.pause();
                }
            });
            
            window.addEventListener('focus', function() {
                if (wasPlayingBeforeHidden && isPlaying) {
                    wasPlayingBeforeHidden = false;
                    songs[currentSongIndex].element.play().catch(console.error);
                }
            });
            
            // ==============================================
            // SISTEMA DE REGISTRO LOCAL DE VISITAS (simplificado)
            // ==============================================
            
            async function registrarVisitaLocal(mensaje, emoji) {
                try {
                    const visita = {
                        fecha: new Date().toLocaleDateString('es-ES'),
                        hora: new Date().toLocaleTimeString('es-ES'),
                        timestamp: Date.now(),
                        mensaje: mensaje,
                        emoji: emoji
                    };
                    
                    console.log('📝 Registrando visita local:', visita);
                    
                    guardarVisitaLocalStorage(visita);
                    
                } catch (error) {
                    console.error('Error al registrar visita local:', error);
                }
            }
            
            function guardarVisitaLocalStorage(visita) {
                try {
                    let historial = JSON.parse(localStorage.getItem('historial_visitas') || '[]');
                    historial.push(visita);
                    
                    if (historial.length > 100) {
                        historial = historial.slice(-100);
                    }
                    
                    localStorage.setItem('historial_visitas', JSON.stringify(historial));
                    localStorage.setItem('ultima_visita', JSON.stringify(visita));
                    
                } catch (error) {
                    console.error('Error al guardar visita local:', error);
                }
            }
            
            function verEstadisticas() {
                const historial = JSON.parse(localStorage.getItem('historial_visitas') || '[]');
                
                console.clear();
                console.log('%c📊 ===== ESTADÍSTICAS LOCALES =====', 'color: #ff5252; font-size: 16px; font-weight: bold');
                console.log(`%cTotal mensajes vistos: ${historial.length}`, 'color: #4CAF50');
                
                if (historial.length > 0) {
                    const porFecha = {};
                    historial.forEach(v => {
                        porFecha[v.fecha] = (porFecha[v.fecha] || 0) + 1;
                    });
                    
                    console.log('\n%c📅 VISITAS POR FECHA:', 'color: #9C27B0; font-weight: bold');
                    Object.entries(porFecha).forEach(([fecha, count]) => {
                        console.log(`   ${fecha}: ${count} mensaje(s)`);
                    });
                    
                    console.log('\n%c📋 ÚLTIMOS MENSAJES:', 'color: #FF9800; font-weight: bold');
                    historial.slice(-15).reverse().forEach((visita, index) => {
                        const num = historial.length - index;
                        console.log(`\n${num}. ${visita.fecha} - ${visita.hora}`);
                        console.log(`   💌 "${visita.mensaje}" ${visita.emoji}`);
                    });
                }
                
                showNotification("Estadísticas mostradas en consola");
            }
            
            // ==============================================
            // INICIALIZACIÓN
            // ==============================================
            
            function inicializarTodo() {
                // Inicializar cielo
                crearEstrellas();
                actualizarCielo();
                
                // Actualizar cielo cada minuto
                setInterval(actualizarCielo, 60000);
                
                // Inicializar reproductor
                initializePlayer();
                
                // Registrar visita inicial
                if (!sessionStorage.getItem('visita_registrada')) {
                    registrarVisitaLocal('Página cargada', '📱');
                    sessionStorage.setItem('visita_registrada', 'true');
                }
                
                // Mostrar notificación inicial
                showNotification("¡Descubre mensajes especiales!");
                $('#musicControl').addClass('pulsing');
                
                setTimeout(function() {
                    $('#musicControl').removeClass('pulsing');
                }, 10000);
                
                // Mostrar información en consola
                console.log('🎵 REPRODUCTOR DE MÚSICA - 3 canciones');
                console.log('🌞 SISTEMA DE SOL Y LUNA ACTIVO');
                console.log('📊 SISTEMA DE VISITAS LOCAL ACTIVO');
                console.log('• Para ver estadísticas: verEstadisticas()');
                
                // Hacer funciones accesibles desde consola
                window.verEstadisticas = verEstadisticas;
            }
            
            // Iniciar cuando el DOM esté listo
            setTimeout(inicializarTodo, 2000);
        });
    </script>
</body>
</html>
